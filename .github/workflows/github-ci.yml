name: CI

on: [push, pull_request]

jobs:

  pre-commit:

    runs-on: ubuntu-24.04

    steps:

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Check pre-commit version
        run: pre-commit --version

      - name: Set up hooks
        run: pre-commit install

      - name: Check style
        run: pre-commit run --all-files


  test:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "pypy3.11"]
        os: [macos-14, macos-15, ubuntu-22.04, ubuntu-24.04, windows-2025, windows-2022]

    steps:

    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
        allow-prereleases: false

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Check python version
      run: python -c "import sys; import platform; print('Python %s implementation %s on %s' % (sys.version, platform.python_implementation(), sys.platform))"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install test and numpy
      run: python -m pip install .[test,numpy]

    - name: Install gurobi
      if: ${{ !startsWith(matrix.python-version, 'pypy') }}
      run: python -m pip install .[gurobi]

    - name: Install highs
      run: python -m pip install .[highs]

    - name: list installed packages
      run: python -m pip list

    - name: Run tests
      run: python -m pytest test --verbose --color=yes --doctest-modules -Werror
